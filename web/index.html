<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token 测试平台 v2.1 — 北京移动 Token 模型聚合平台</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-brand">🦞 Token Test</div>
    <div class="sidebar-nav">
      <div class="nav-item active" data-panel="p-dashboard"><span class="icon">📊</span><span>总览</span></div>
      <div class="nav-item" data-panel="p-results"><span class="icon">📋</span><span>结果</span></div>
      <div class="nav-item" data-panel="p-settings"><span class="icon">⚙️</span><span>设置</span></div>
      <div class="nav-item" data-panel="p-reports"><span class="icon">📄</span><span>报告</span></div>
    </div>
    <div class="sidebar-footer">v2.1.0 ｜ Beijing Mobile</div>
  </nav>

  <!-- Main -->
  <div class="main">

    <!-- ===== Dashboard ===== -->
    <div id="p-dashboard" class="panel active">
      <div class="section-title">🚀 测试控制</div>
      <div class="card">
        <div class="grid3">
          <div class="field">
            <label>赛道选择</label>
            <select id="trackSel"><option value="all">所有赛道</option></select>
          </div>
          <div class="field">
            <label>并发数</label>
            <input type="number" id="concIn" value="10" min="1" max="100">
          </div>
          <div class="field">
            <label>模型过滤</label>
            <input id="modelFil" placeholder="输入模型名过滤">
          </div>
        </div>
        <div class="inlineBtns" style="gap:8px">
          <button class="btn btnPri" id="btnAllTrk" onclick="doRunAll()">▶ 全部赛道</button>
          <button class="btn btnSuc" id="btnSelTrk" onclick="doRunSel()">▶ 选中赛道</button>
          <button class="btn btnGry" onclick="doRefresh()">🔄 刷新</button>
          <button class="btn btnDng" onclick="doCancel()">⏹ 取消</button>
        </div>
      </div>

      <div class="section-title">📊 概览统计</div>
      <div class="grid4">
        <div class="stat-card"><div class="val" id="statTotalReq">0</div><div class="lbl">总请求</div></div>
        <div class="stat-card"><div class="val" id="statSuccess">0</div><div class="lbl">成功</div></div>
        <div class="stat-card"><div class="val" id="statError">0</div><div class="lbl">失败</div></div>
        <div class="stat-card"><div class="val" id="statSuccessRate">0%</div><div class="lbl">成功率</div></div>
      </div>

      <div class="section-title">🏁 赛道状态</div>
      <div id="tracksGrid"></div>

      <div class="section-title">🤖 模型列表</div>
      <div class="card" style="overflow-x:auto">
        <table class="dataTab">
          <thead><tr><th>#</th><th>名称</th><th>赛道</th><th>Base URL</th><th>状态</th><th>Key</th></tr></thead>
          <tbody id="monTB"></tbody>
        </table>
      </div>

      <div class="section-title">📜 实时日志</div>
      <div class="logBox" id="logBox">等待任务启动...</div>
    </div>

    <!-- ===== Results ===== -->
    <div id="p-results" class="panel">
      <div class="section-title">📋 测试历史</div>
      <div id="resultsList"><p style="color:#999">暂无测试结果</p></div>
    </div>

    <!-- ===== Settings ===== -->
    <div id="p-settings" class="panel">
      <div class="section-title">⚙️ 全局设置</div>
      <div class="card">
        <div class="field">
          <label>默认并发数</label>
          <input type="number" id="setDefaultConc" value="10" min="1" max="100">
        </div>
        <div class="inlineBtns">
          <button class="btn btnPri" onclick="saveSettings()">💾 保存设置</button>
        </div>
      </div>

      <div class="section-title">🔧 模型配置</div>
      <div id="modelConfigs"></div>
    </div>

    <!-- ===== Reports ===== -->
    <div id="p-reports" class="panel">
      <div class="section-title">📄 测试报告</div>
      <div id="reportList"><p style="color:#999">暂无报告</p></div>
    </div>

  </div><!-- /main -->
</div><!-- /layout -->

<script src="js/main.js"></script>
</body>
</html>
