# 下游模型端点配置（13+候选模型，全部纳入）
# 格式：OpenAI 兼容 API，按赛道分类
# 使用前请填入实际端点和 API Key

# ──────────────────────────────────────────────
# 方向1：文本大模型（3个）
# ──────────────────────────────────────────────
text_models:
  - id: "qwen3.5-35b-a3b"
    name: "Qwen3.5-35B-A3B"
    track: "text"
    base_url: "http://<MODEL_IP>:8000/v1"
    api_key: "sk-xxxxxxxxxxxxxxxx"
    model_name: "Qwen3.5-35B-A3B"
    max_tokens: 4096
    temperature: 0.7
    context_window: 262144
    enabled: true

  - id: "qwen3-32b"
    name: "Qwen3-32B"
    track: "text"
    base_url: "http://<MODEL_IP>:8001/v1"
    api_key: "sk-xxxxxxxxxxxxxxxx"
